 <!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Apartment Listing — Sunny 2-Bedroom</title>
</head>

<body>

  <!-- HERO SECTION: Main listing title and basic info -->
  <h1>Sunny 2-Bedroom Apartment</h1>
  <h3>Pine - $1,250/month</h3>

  <!-- IMAGE SECTION: Displays a photo of the apartment -->
  <img 
    src="https://i.postimg.cc/KjkQBJ9W/5653a763-jpg.avif" 
    alt="Sunny 2-bedroom apartment interior"> 
    <!-- 'alt' text improves accessibility and shows if the image fails to load -->

  <!-- DESCRIPTION SECTION: Details about the apartment -->
  <p>
    This bright and spacious 2-bedroom apartment features an open floor plan, a modern kitchen, and a balcony with a great view.
    <br> <!-- Line break used here to separate the main description from the highlighted info -->
    <b>Conveniently located near shopping, parks, and public transportation.</b>
    <!-- <b> is used to emphasize important selling points for the reader -->
  </p>

  <!-- FOOTER SECTION: (could include contact info or application details in the future) -->

</body>
</html>
</body>
</html>
