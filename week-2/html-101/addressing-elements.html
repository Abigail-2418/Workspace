  <!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Multi-Section Page</title>
</head>

<body>

  <!-- NAVIGATION: Links jump to each section using ID anchors -->
  <nav>
    <a href="#home">Home</a>
    <a href="#about">About</a>
    <a href="#contact">Contact</a>
  </nav>

  <!-- SECTION 1 -->
  <section id="home" class="page-section">
    <h1>Home</h1>
    <p>Welcome to my webpage. This is the home section.</p>
  </section>

  <!-- SECTION 2 -->
  <section id="about" class="page-section">
    <h1>About</h1>
    <p>This section is about the purpose of the site and what it contains.</p>
  </section>

  <!-- SECTION 3 -->
  <section id="contact" class="page-section">
    <h1>Contact</h1>
    <p>You can reach me through email or social media listed here.</p>
  </section>

</body>
</html>
